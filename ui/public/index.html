<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Think Tank Core</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Consolas', 'Monaco', monospace; background: #0a0a0a; color: #e0e0e0; padding: 16px; }
    h1 { font-size: 18px; color: #8be9fd; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .card { background: #1a1a2e; border: 1px solid #333; border-radius: 6px; padding: 12px; }
    .card h2 { font-size: 13px; color: #bd93f9; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .card.full { grid-column: 1 / -1; }
    .stat { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #222; font-size: 13px; }
    .stat:last-child { border-bottom: none; }
    .stat .label { color: #888; }
    .stat .value { color: #f8f8f2; }
    .badge { display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: 11px; }
    .badge.running { background: #1a472a; color: #50fa7b; }
    .badge.paused { background: #4a3a1a; color: #f1fa8c; }
    .badge.stopped { background: #4a1a1a; color: #ff5555; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot.ok { background: #50fa7b; }
    .dot.err { background: #ff5555; }
    .queue-list { font-size: 12px; }
    .queue-list li { padding: 3px 0; color: #ccc; list-style: none; }
    .queue-list li::before { content: '▸ '; color: #6272a4; }
    #logs { max-height: 300px; overflow-y: auto; font-size: 12px; line-height: 1.6; }
    .log-entry { padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
    .log-entry.error { color: #ff5555; }
    .log-entry.warn { color: #f1fa8c; }
    .log-entry.info { color: #ccc; }
    .log-entry.debug { color: #6272a4; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 0; }
    .tab { padding: 6px 16px; font-size: 12px; background: #111; border: 1px solid #333; border-bottom: none; cursor: pointer; color: #888; border-radius: 4px 4px 0 0; }
    .tab.active { background: #1a1a2e; color: #bd93f9; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Chat */
    .chat-area { max-height: 300px; overflow-y: auto; margin-bottom: 8px; }
    .chat-msg { padding: 6px 0; border-bottom: 1px solid #1a1a2e; font-size: 13px; line-height: 1.5; }
    .chat-msg.user { color: #8be9fd; }
    .chat-msg.assistant { color: #f8f8f2; }
    .chat-msg .role-label { font-weight: bold; }
    .chat-msg.user .role-label { color: #8be9fd; }
    .chat-msg.assistant .role-label { color: #bd93f9; }
    .chat-msg .md-body { display: inline; }
    .chat-msg .md-body p { margin: 4px 0; }
    .chat-msg .md-body code { background: #282a36; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    .chat-msg .md-body pre { background: #282a36; padding: 8px; border-radius: 4px; margin: 6px 0; overflow-x: auto; }
    .chat-msg .md-body pre code { background: none; padding: 0; }
    .chat-msg .md-body ul, .chat-msg .md-body ol { margin: 4px 0 4px 20px; }
    .chat-msg .md-body h1, .chat-msg .md-body h2, .chat-msg .md-body h3 { margin: 8px 0 4px; font-size: 14px; color: #8be9fd; }
    .chat-msg .md-body blockquote { border-left: 3px solid #6272a4; padding-left: 8px; margin: 4px 0; color: #999; }
    .chat-msg .md-body table { border-collapse: collapse; margin: 6px 0; }
    .chat-msg .md-body th, .chat-msg .md-body td { border: 1px solid #444; padding: 4px 8px; font-size: 12px; }
    .chat-msg .md-body th { background: #282a36; }
    .chat-msg.thinking { color: #6272a4; font-style: italic; }
    .chat-input { display: flex; gap: 8px; }
    .chat-input input { flex: 1; background: #111; border: 1px solid #333; color: #f8f8f2; padding: 8px; font-family: inherit; font-size: 13px; border-radius: 4px; }
    .chat-input input:focus { outline: none; border-color: #bd93f9; }
    .chat-input button { background: #44475a; color: #f8f8f2; border: 1px solid #555; padding: 8px 16px; cursor: pointer; font-family: inherit; font-size: 13px; border-radius: 4px; }
    .chat-input button:hover { background: #6272a4; }
    .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Knowledge */
    .knowledge-list { max-height: 400px; overflow-y: auto; }
    .k-entry { background: #111; border: 1px solid #222; border-radius: 4px; padding: 8px; margin-bottom: 6px; font-size: 12px; }
    .k-entry .k-topic { color: #8be9fd; font-weight: bold; margin-bottom: 4px; }
    .k-entry .k-category { color: #bd93f9; font-size: 11px; float: right; }
    .k-entry .k-time { color: #6272a4; font-size: 11px; }
    .k-entry .k-body { color: #ccc; margin-top: 4px; white-space: pre-wrap; word-break: break-all; }

    .footer { text-align: center; padding: 12px; font-size: 11px; color: #555; }
  </style>
</head>
<body>
  <h1><span class="dot" id="conn"></span>Think Tank Core Dashboard</h1>

  <div class="grid">
    <div class="card">
      <h2>Server Status</h2>
      <div id="status-body">Connecting...</div>
    </div>
    <div class="card">
      <h2>Task Queue</h2>
      <div id="queue-body">&mdash;</div>
    </div>
  </div>

  <div class="card full" style="margin-bottom:12px">
    <div class="tabs">
      <div class="tab active" data-tab="chat">Chat</div>
      <div class="tab" data-tab="knowledge">Knowledge DB</div>
      <div class="tab" data-tab="logs">Logs</div>
    </div>

    <div id="tab-chat" class="tab-content active" style="padding-top:12px">
      <div class="chat-area" id="chat-area"></div>
      <div class="chat-input">
        <input type="text" id="chat-input" placeholder="メッセージを入力..." />
        <button id="chat-send">Send</button>
      </div>
    </div>

    <div id="tab-knowledge" class="tab-content" style="padding-top:12px">
      <div class="knowledge-list" id="knowledge-list">Loading...</div>
    </div>

    <div id="tab-logs" class="tab-content" style="padding-top:12px">
      <div id="logs"></div>
    </div>
  </div>

  <div class="footer">Auto-refresh: 5s</div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    let apiUrl = 'http://localhost:3000';

    // Configure marked for safe rendering
    if (typeof marked !== 'undefined') {
      marked.setOptions({ breaks: true, gfm: true });
    }
    function sanitizeHtml(html) {
      // Remove script tags, event handlers, and dangerous attributes
      return html
        .replace(/<script[\s\S]*?<\/script>/gi, '')
        .replace(/<iframe[\s\S]*?<\/iframe>/gi, '')
        .replace(/\son\w+\s*=/gi, ' data-removed=')
        .replace(/javascript\s*:/gi, '')
        .replace(/<(link|meta|base|object|embed|form|input|button|select|textarea)\b[^>]*>/gi, '');
    }
    function renderMd(text) {
      if (typeof marked !== 'undefined' && marked.parse) {
        try { return sanitizeHtml(marked.parse(text)); } catch {}
      }
      return esc(text);
    }

    // --- Tabs ---
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        if (tab.dataset.tab === 'knowledge') fetchKnowledge();
      });
    });

    // --- Helpers ---
    function formatUptime(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      return h + 'h ' + m + 'm ' + s + 's';
    }
    function badge(state) {
      if (state === 'running') return '<span class="badge running">RUNNING</span>';
      if (state === 'paused') return '<span class="badge paused">PAUSED</span>';
      return '<span class="badge stopped">STOPPED</span>';
    }
    function esc(s) {
      const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
    }

    // --- Status ---
    async function fetchStatus() {
      try {
        const res = await fetch(apiUrl + '/status');
        const data = await res.json();
        const tm = data.taskManager;
        const state = tm.paused ? 'paused' : tm.running ? 'running' : 'stopped';
        document.getElementById('conn').className = 'dot ok';
        document.getElementById('status-body').innerHTML = [
          '<div class="stat"><span class="label">State</span><span class="value">' + badge(state) + '</span></div>',
          '<div class="stat"><span class="label">Current Task</span><span class="value">' + esc(tm.currentTask || '\u2014') + '</span></div>',
          '<div class="stat"><span class="label">Queue</span><span class="value">' + tm.queueLength + ' tasks</span></div>',
          '<div class="stat"><span class="label">Uptime</span><span class="value">' + formatUptime(data.uptime) + '</span></div>',
          '<div class="stat"><span class="label">Knowledge</span><span class="value">' + data.knowledge.entries + ' entries</span></div>',
          '<div class="stat"><span class="label">Last Commit</span><span class="value">' + esc(data.lastCommit ? data.lastCommit.message : '\u2014') + '</span></div>',
        ].join('');

        if (tm.queuedTasks.length === 0) {
          document.getElementById('queue-body').innerHTML = '<span style="color:#666">Empty</span>';
        } else {
          document.getElementById('queue-body').innerHTML =
            '<ul class="queue-list">' + tm.queuedTasks.map(function(t) { return '<li>' + esc(t) + '</li>'; }).join('') + '</ul>';
        }
      } catch {
        document.getElementById('conn').className = 'dot err';
        document.getElementById('status-body').innerHTML = '<span style="color:#ff5555">Connection failed</span>';
      }
    }

    // --- Logs ---
    async function fetchLogs() {
      try {
        const res = await fetch(apiUrl + '/logs?count=100');
        const data = await res.json();
        const container = document.getElementById('logs');
        const wasAtBottom = container.scrollTop + container.clientHeight >= container.scrollHeight - 20;
        container.innerHTML = data.map(function(e) {
          const ts = e.timestamp.split('T')[1].split('.')[0];
          return '<div class="log-entry ' + e.level + '">[' + ts + '] [' + e.level + '] ' + esc(e.message) + '</div>';
        }).join('');
        if (wasAtBottom) container.scrollTop = container.scrollHeight;
      } catch {}
    }

    // --- Chat ---
    const chatArea = document.getElementById('chat-area');
    const chatInput = document.getElementById('chat-input');
    const chatSend = document.getElementById('chat-send');

    function addChatMsg(role, text) {
      const div = document.createElement('div');
      div.className = 'chat-msg ' + role;
      if (role === 'assistant') {
        div.innerHTML = '<span class="role-label">AI: </span><span class="md-body">' + renderMd(text) + '</span>';
      } else if (role === 'user') {
        div.innerHTML = '<span class="role-label">You: </span>' + esc(text);
      } else {
        div.textContent = text;
      }
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      return div;
    }

    async function sendChat() {
      const msg = chatInput.value.trim();
      if (!msg) return;
      chatInput.value = '';
      chatSend.disabled = true;

      addChatMsg('user', msg);
      const thinkingEl = addChatMsg('thinking', 'Thinking...');

      try {
        const res = await fetch(apiUrl + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        thinkingEl.remove();
        if (data.reply) {
          addChatMsg('assistant', data.reply);
        } else if (data.error) {
          addChatMsg('thinking', 'Error: ' + data.error);
        }
      } catch (e) {
        thinkingEl.remove();
        addChatMsg('thinking', 'Connection error');
      }
      chatSend.disabled = false;
      chatInput.focus();
    }

    chatSend.addEventListener('click', sendChat);
    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendChat();
    });

    // --- Knowledge DB ---
    async function fetchKnowledge() {
      try {
        const res = await fetch(apiUrl + '/knowledge?count=50');
        const data = await res.json();
        const container = document.getElementById('knowledge-list');
        if (data.length === 0) {
          container.innerHTML = '<span style="color:#666">No entries yet</span>';
          return;
        }
        container.innerHTML = data.map(function(e) {
          const time = e.timestamp ? e.timestamp.replace('T', ' ').split('.')[0] : '';
          const topic = e.topic || e._category || 'unknown';
          const body = e.insights
            ? JSON.stringify(e.insights, null, 2)
            : (e.analysis ? JSON.stringify(e.analysis, null, 2).slice(0, 500) : JSON.stringify(e, null, 2).slice(0, 300));
          return '<div class="k-entry">' +
            '<span class="k-category">' + esc(e._category) + '</span>' +
            '<div class="k-topic">' + esc(topic) + '</div>' +
            '<div class="k-time">' + esc(time) + '</div>' +
            '<div class="k-body">' + renderMd(body) + '</div>' +
            '</div>';
        }).join('');
      } catch {
        document.getElementById('knowledge-list').innerHTML = '<span style="color:#ff5555">Failed to load</span>';
      }
    }

    // --- Init ---
    async function init() {
      try {
        const res = await fetch('/api-url');
        const data = await res.json();
        apiUrl = data.url;
      } catch {}
      fetchStatus();
      fetchLogs();
      setInterval(fetchStatus, 5000);
      setInterval(fetchLogs, 5000);
    }
    init();
  </script>
</body>
</html>
