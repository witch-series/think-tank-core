<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Think Tank Core</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Consolas', 'Monaco', monospace; background: #0a0a0a; color: #e0e0e0; display: flex; flex-direction: column; }

    /* Header */
    .header { padding: 10px 16px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; border-bottom: 1px solid #222; }
    .header h1 { font-size: 16px; color: #8be9fd; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
    .dot.ok { background: #50fa7b; }
    .dot.err { background: #ff5555; }
    .header-status { font-size: 11px; color: #666; margin-left: auto; }
    .activity-bar { padding: 4px 16px; font-size: 12px; color: #f1fa8c; background: #1a1a2e; border-bottom: 1px solid #222; flex-shrink: 0; display: none; align-items: center; gap: 8px; }
    .activity-bar.active { display: flex; }
    .activity-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #444; border-top-color: #f1fa8c; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .activity-label { color: #bd93f9; font-weight: bold; text-transform: uppercase; font-size: 11px; }
    .activity-detail { color: #ccc; }

    /* Tabs */
    .tabs { display: flex; gap: 0; padding: 0 16px; flex-shrink: 0; background: #0a0a0a; border-bottom: 1px solid #333; }
    .tab { padding: 8px 20px; font-size: 13px; background: #111; border: 1px solid #333; border-bottom: none; cursor: pointer; color: #888; border-radius: 4px 4px 0 0; margin-bottom: -1px; }
    .tab.active { background: #1a1a2e; color: #bd93f9; border-bottom-color: #1a1a2e; }
    .tab:hover:not(.active) { color: #ccc; }

    /* Tab content */
    .tab-body { flex: 1; overflow: hidden; background: #1a1a2e; border: 1px solid #333; border-top: none; margin: 0 16px 12px; border-radius: 0 0 6px 6px; display: flex; flex-direction: column; }
    .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .tab-content.active { display: flex; }

    /* Badge */
    .badge { display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: 11px; }
    .badge.running { background: #1a472a; color: #50fa7b; }
    .badge.paused { background: #4a3a1a; color: #f1fa8c; }
    .badge.stopped { background: #4a1a1a; color: #ff5555; }

    /* Stat rows */
    .stat { display: flex; justify-content: space-between; padding: 6px 16px; border-bottom: 1px solid #222; font-size: 13px; }
    .stat:last-child { border-bottom: none; }
    .stat .label { color: #888; }
    .stat .value { color: #f8f8f2; }

    /* Logs */
    .log-scroll { flex: 1; overflow-y: auto; padding: 8px 16px; }
    .log-entry { padding: 1px 0; white-space: pre-wrap; word-break: break-all; font-size: 12px; line-height: 1.6; }
    .log-entry.error { color: #ff5555; }
    .log-entry.warn { color: #f1fa8c; }
    .log-entry.info { color: #ccc; }
    .log-entry.debug { color: #6272a4; }

    /* Chat */
    .chat-area { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .chat-msg { padding: 6px 0; border-bottom: 1px solid #222; font-size: 13px; line-height: 1.5; }
    .chat-msg.user { color: #8be9fd; }
    .chat-msg.assistant { color: #f8f8f2; }
    .chat-msg .role-label { font-weight: bold; }
    .chat-msg.user .role-label { color: #8be9fd; }
    .chat-msg.assistant .role-label { color: #bd93f9; }
    .chat-msg .md-body { display: inline; }
    .chat-msg .md-body p { margin: 4px 0; }
    .chat-msg .md-body code { background: #282a36; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    .chat-msg .md-body pre { background: #282a36; padding: 8px; border-radius: 4px; margin: 6px 0; overflow-x: auto; }
    .chat-msg .md-body pre code { background: none; padding: 0; }
    .chat-msg .md-body ul, .chat-msg .md-body ol { margin: 4px 0 4px 20px; }
    .chat-msg .md-body h1, .chat-msg .md-body h2, .chat-msg .md-body h3 { margin: 8px 0 4px; font-size: 14px; color: #8be9fd; }
    .chat-msg .md-body blockquote { border-left: 3px solid #6272a4; padding-left: 8px; margin: 4px 0; color: #999; }
    .chat-msg .md-body table { border-collapse: collapse; margin: 6px 0; }
    .chat-msg .md-body th, .chat-msg .md-body td { border: 1px solid #444; padding: 4px 8px; font-size: 12px; }
    .chat-msg .md-body th { background: #282a36; }
    .chat-msg.thinking { color: #6272a4; font-style: italic; }
    .chat-input { display: flex; gap: 8px; padding: 8px 16px; border-top: 1px solid #333; flex-shrink: 0; }
    .chat-input input { flex: 1; background: #111; border: 1px solid #333; color: #f8f8f2; padding: 8px; font-family: inherit; font-size: 13px; border-radius: 4px; }
    .chat-input input:focus { outline: none; border-color: #bd93f9; }
    .chat-input button { background: #44475a; color: #f8f8f2; border: 1px solid #555; padding: 8px 16px; cursor: pointer; font-family: inherit; font-size: 13px; border-radius: 4px; }
    .chat-input button:hover { background: #6272a4; }
    .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Knowledge / Summary entries */
    .k-scroll { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .k-entry { background: #111; border: 1px solid #222; border-radius: 4px; padding: 10px; margin-bottom: 8px; font-size: 12px; }
    .k-entry .k-topic { color: #8be9fd; font-weight: bold; margin-bottom: 4px; }
    .k-entry .k-category { color: #bd93f9; font-size: 11px; float: right; }
    .k-entry .k-time { color: #6272a4; font-size: 11px; }
    .k-entry .k-body { color: #ccc; margin-top: 6px; white-space: pre-wrap; word-break: break-all; }
    .k-entry .k-sources { margin-top: 6px; font-size: 11px; }
    .k-entry .k-sources a { color: #6272a4; text-decoration: none; word-break: break-all; }
    .k-entry .k-sources a:hover { color: #8be9fd; text-decoration: underline; }

    /* Search bar */
    .search-bar { display: flex; gap: 8px; padding: 10px 16px; border-bottom: 1px solid #333; flex-shrink: 0; }
    .search-bar input { flex: 1; background: #111; border: 1px solid #333; color: #f8f8f2; padding: 8px; font-family: inherit; font-size: 13px; border-radius: 4px; }
    .search-bar input:focus { outline: none; border-color: #bd93f9; }
    .search-bar button { background: #44475a; color: #f8f8f2; border: 1px solid #555; padding: 8px 16px; cursor: pointer; font-family: inherit; font-size: 13px; border-radius: 4px; }
    .search-bar button:hover { background: #6272a4; }
    .search-bar .result-count { font-size: 11px; color: #6272a4; align-self: center; white-space: nowrap; }

    /* Status tab */
    .status-scroll { flex: 1; overflow-y: auto; }
    .status-section { padding: 12px 16px; border-bottom: 1px solid #222; }
    .status-section h3 { font-size: 12px; color: #bd93f9; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

    /* Empty state */
    .empty { color: #666; padding: 20px; text-align: center; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="dot" id="conn"></span>
    <h1>Think Tank Core</h1>
    <span class="header-status" id="header-status"></span>
  </div>

  <div class="activity-bar" id="activity-bar">
    <span class="activity-spinner"></span>
    <span class="activity-label" id="activity-phase"></span>
    <span class="activity-detail" id="activity-detail"></span>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="chat">Chat</div>
    <div class="tab" data-tab="summary">Summary</div>
    <div class="tab" data-tab="knowledge">Knowledge DB</div>
    <div class="tab" data-tab="logs">Logs</div>
    <div class="tab" data-tab="status">Status</div>
  </div>

  <div class="tab-body">
    <!-- Chat -->
    <div id="tab-chat" class="tab-content active">
      <div class="chat-area" id="chat-area"></div>
      <div class="chat-input">
        <input type="text" id="chat-input" placeholder="メッセージを入力..." />
        <button id="chat-send">Send</button>
      </div>
    </div>

    <!-- Summary (insights/summaries from research) -->
    <div id="tab-summary" class="tab-content">
      <div class="search-bar">
        <input type="text" id="summary-search" placeholder="キーワードで検索..." />
        <button id="summary-search-btn">Search</button>
        <span class="result-count" id="summary-count"></span>
      </div>
      <div class="k-scroll" id="summary-list"><div class="empty">Loading...</div></div>
    </div>

    <!-- Knowledge DB (searchable raw data) -->
    <div id="tab-knowledge" class="tab-content">
      <div class="search-bar">
        <input type="text" id="kb-search" placeholder="キーワードで検索..." />
        <button id="kb-search-btn">Search</button>
        <span class="result-count" id="kb-count"></span>
      </div>
      <div class="k-scroll" id="knowledge-list"><div class="empty">検索キーワードを入力するか、空欄で全件表示</div></div>
    </div>

    <!-- Logs -->
    <div id="tab-logs" class="tab-content">
      <div class="log-scroll" id="logs"></div>
    </div>

    <!-- Status -->
    <div id="tab-status" class="tab-content">
      <div class="status-scroll" id="status-body">
        <div class="empty">Connecting...</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    let apiUrl = 'http://localhost:3000';

    // Configure marked for safe rendering
    if (typeof marked !== 'undefined') {
      marked.setOptions({ breaks: true, gfm: true });
    }
    function sanitizeHtml(html) {
      return html
        .replace(/<script[\s\S]*?<\/script>/gi, '')
        .replace(/<iframe[\s\S]*?<\/iframe>/gi, '')
        .replace(/\son\w+\s*=/gi, ' data-removed=')
        .replace(/javascript\s*:/gi, '')
        .replace(/<(link|meta|base|object|embed|form|input|button|select|textarea)\b[^>]*>/gi, '');
    }
    function renderMd(text) {
      if (typeof marked !== 'undefined' && marked.parse) {
        try { return sanitizeHtml(marked.parse(text)); } catch {}
      }
      return esc(text);
    }

    // --- Tabs ---
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        if (tab.dataset.tab === 'summary') fetchSummary();
        if (tab.dataset.tab === 'knowledge') fetchKnowledgeDB();
      });
    });

    // --- Helpers ---
    function formatUptime(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);
      return h + 'h ' + m + 'm ' + s + 's';
    }
    function badge(state) {
      if (state === 'running') return '<span class="badge running">RUNNING</span>';
      if (state === 'paused') return '<span class="badge paused">PAUSED</span>';
      return '<span class="badge stopped">STOPPED</span>';
    }
    function esc(s) {
      const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
    }

    // --- Status ---
    async function fetchStatus() {
      try {
        const res = await fetch(apiUrl + '/status');
        const data = await res.json();
        const tm = data.taskManager;
        const state = tm.paused ? 'paused' : tm.running ? 'running' : 'stopped';
        document.getElementById('conn').className = 'dot ok';

        // Header mini-status
        document.getElementById('header-status').textContent =
          state.toUpperCase() + ' | ' + formatUptime(data.uptime) + ' | ' + data.knowledge.entries + ' entries';

        // Activity bar
        const bar = document.getElementById('activity-bar');
        const act = data.activity || {};
        if (act.phase && act.phase !== 'idle') {
          bar.classList.add('active');
          const phaseLabels = {
            planning: 'Planning', searching: 'Searching', saving: 'Saving',
            organizing: 'Organizing', generating: 'Generating', analyzing: 'Analyzing',
            improving: 'Improving', research: 'Research', deep_research: 'Deep Research',
            analyze_code: 'Analyzing', improve_code: 'Improving', generate_script: 'Generating'
          };
          document.getElementById('activity-phase').textContent = phaseLabels[act.phase] || act.phase;
          document.getElementById('activity-detail').textContent = act.detail || '';
        } else {
          bar.classList.remove('active');
        }

        // Full status tab
        document.getElementById('status-body').innerHTML =
          '<div class="status-section">' +
            '<h3>Server</h3>' +
            '<div class="stat"><span class="label">State</span><span class="value">' + badge(state) + '</span></div>' +
            '<div class="stat"><span class="label">Uptime</span><span class="value">' + formatUptime(data.uptime) + '</span></div>' +
            '<div class="stat"><span class="label">Current Task</span><span class="value">' + esc(tm.currentTask || '\u2014') + '</span></div>' +
            '<div class="stat"><span class="label">Activity</span><span class="value">' + esc(act.phase && act.phase !== 'idle' ? act.phase + (act.detail ? ': ' + act.detail : '') : '\u2014') + '</span></div>' +
            '<div class="stat"><span class="label">Queue</span><span class="value">' + tm.queueLength + ' tasks</span></div>' +
          '</div>' +
          '<div class="status-section">' +
            '<h3>Ollama</h3>' +
            (data.ollama ? (
              '<div class="stat"><span class="label">URL</span><span class="value">' + esc(data.ollama.currentUrl || '\u2014') + '</span></div>' +
              '<div class="stat"><span class="label">Model</span><span class="value">' + esc(data.ollama.model || '\u2014') + '</span></div>' +
              '<div class="stat"><span class="label">Fail Count</span><span class="value">' + (data.ollama.failCount || 0) + '</span></div>' +
              '<div class="stat"><span class="label">URLs</span><span class="value">' + esc((data.ollama.urls || []).join(', ')) + '</span></div>'
            ) : '<div class="stat"><span class="label">Status</span><span class="value">Not connected</span></div>') +
          '</div>' +
          '<div class="status-section">' +
            '<h3>Knowledge DB</h3>' +
            '<div class="stat"><span class="label">Files</span><span class="value">' + data.knowledge.files + '</span></div>' +
            '<div class="stat"><span class="label">Entries</span><span class="value">' + data.knowledge.entries + '</span></div>' +
          '</div>' +
          '<div class="status-section">' +
            '<h3>Last Commit</h3>' +
            '<div class="stat"><span class="label">Message</span><span class="value">' + esc(data.lastCommit ? data.lastCommit.message : '\u2014') + '</span></div>' +
            (data.lastCommit ? '<div class="stat"><span class="label">Date</span><span class="value">' + esc(data.lastCommit.date || '') + '</span></div>' : '') +
          '</div>';
      } catch {
        document.getElementById('conn').className = 'dot err';
        document.getElementById('header-status').textContent = 'OFFLINE';
        document.getElementById('activity-bar').classList.remove('active');
        document.getElementById('status-body').innerHTML = '<div class="empty" style="color:#ff5555">Connection failed</div>';
      }
    }

    // --- Logs ---
    async function fetchLogs() {
      try {
        const res = await fetch(apiUrl + '/logs?count=200');
        const data = await res.json();
        const container = document.getElementById('logs');
        const wasAtBottom = container.scrollTop + container.clientHeight >= container.scrollHeight - 20;
        container.innerHTML = data.map(function(e) {
          const ts = e.timestamp.split('T')[1].split('.')[0];
          return '<div class="log-entry ' + e.level + '">[' + ts + '] [' + e.level + '] ' + esc(e.message) + '</div>';
        }).join('');
        if (wasAtBottom) container.scrollTop = container.scrollHeight;
      } catch {}
    }

    // --- Chat ---
    const chatArea = document.getElementById('chat-area');
    const chatInput = document.getElementById('chat-input');
    const chatSend = document.getElementById('chat-send');

    function addChatMsg(role, text) {
      const div = document.createElement('div');
      div.className = 'chat-msg ' + role;
      if (role === 'assistant') {
        div.innerHTML = '<span class="role-label">AI: </span><span class="md-body">' + renderMd(text) + '</span>';
      } else if (role === 'user') {
        div.innerHTML = '<span class="role-label">You: </span>' + esc(text);
      } else {
        div.textContent = text;
      }
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      return div;
    }

    async function sendChat() {
      const msg = chatInput.value.trim();
      if (!msg) return;
      chatInput.value = '';
      chatSend.disabled = true;

      addChatMsg('user', msg);
      const thinkingEl = addChatMsg('thinking', 'Thinking...');

      try {
        const res = await fetch(apiUrl + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        thinkingEl.remove();
        if (data.reply) {
          addChatMsg('assistant', data.reply);
        } else if (data.error) {
          addChatMsg('thinking', 'Error: ' + data.error);
        }
      } catch (e) {
        thinkingEl.remove();
        addChatMsg('thinking', 'Connection error');
      }
      chatSend.disabled = false;
      chatInput.focus();
    }

    chatSend.addEventListener('click', sendChat);
    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendChat();
    });

    // --- Summary (insights/summaries) ---
    let allSummaryData = [];

    async function fetchSummary() {
      try {
        const res = await fetch(apiUrl + '/knowledge?count=50');
        allSummaryData = await res.json();
        var query = document.getElementById('summary-search').value.trim();
        if (query) { searchSummary(); } else { renderSummary(allSummaryData); }
      } catch {
        document.getElementById('summary-list').innerHTML = '<div class="empty" style="color:#ff5555">Failed to load</div>';
      }
    }

    function searchSummary() {
      var query = document.getElementById('summary-search').value.trim().toLowerCase();
      if (!query) { renderSummary(allSummaryData); return; }
      var keywords = query.split(/\s+/);
      var filtered = allSummaryData.filter(function(e) {
        var text = JSON.stringify(e).toLowerCase();
        return keywords.every(function(kw) { return text.indexOf(kw) !== -1; });
      });
      renderSummary(filtered);
    }

    function renderSourceLinks(sources) {
      if (!Array.isArray(sources) || sources.length === 0) return '';
      return '<div class="k-sources">Sources: ' +
        sources.map(function(url) {
          return '<a href="' + esc(url) + '" target="_blank" rel="noopener">' + esc(url.length > 60 ? url.slice(0, 60) + '...' : url) + '</a>';
        }).join(' | ') + '</div>';
    }

    function renderSummary(data) {
      var container = document.getElementById('summary-list');
      var countEl = document.getElementById('summary-count');
      countEl.textContent = data.length + ' entries';

      if (data.length === 0) {
        container.innerHTML = '<div class="empty">No matching entries</div>';
        return;
      }
      container.innerHTML = data.map(function(e) {
        var time = e.timestamp ? e.timestamp.replace('T', ' ').split('.')[0] : '';
        var topic = e.topic || e._category || 'unknown';

        var body = '';
        if (e.summary && e.summary.length > 10) {
          body = e.summary;
        } else if (e.insights && e.insights.length > 0) {
          body = JSON.stringify(e.insights, null, 2);
        } else if (e.analysis) {
          body = JSON.stringify(e.analysis, null, 2).slice(0, 500);
        } else {
          body = JSON.stringify(e, null, 2).slice(0, 300);
        }

        return '<div class="k-entry">' +
          '<span class="k-category">' + esc(e._category || '') + '</span>' +
          '<div class="k-topic">' + esc(topic) + '</div>' +
          '<div class="k-time">' + esc(time) + '</div>' +
          '<div class="k-body">' + renderMd(body) + '</div>' +
          renderSourceLinks(e.sources) +
          '</div>';
      }).join('');
    }

    document.getElementById('summary-search-btn').addEventListener('click', searchSummary);
    document.getElementById('summary-search').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') searchSummary();
    });

    // --- Knowledge DB (searchable) ---
    let allKnowledgeData = [];

    async function fetchKnowledgeDB() {
      try {
        const res = await fetch(apiUrl + '/knowledge?count=500');
        allKnowledgeData = await res.json();
        // Re-apply current search filter if any
        const query = document.getElementById('kb-search').value.trim();
        if (query) {
          searchKnowledge();
        } else {
          renderKnowledge(allKnowledgeData);
        }
      } catch {
        document.getElementById('knowledge-list').innerHTML = '<div class="empty" style="color:#ff5555">Failed to load</div>';
      }
    }

    function searchKnowledge() {
      const query = document.getElementById('kb-search').value.trim().toLowerCase();
      if (!query) {
        renderKnowledge(allKnowledgeData);
        return;
      }
      const keywords = query.split(/\s+/);
      const filtered = allKnowledgeData.filter(function(e) {
        const text = JSON.stringify(e).toLowerCase();
        return keywords.every(function(kw) { return text.indexOf(kw) !== -1; });
      });
      renderKnowledge(filtered);
    }

    function renderKnowledge(data) {
      const container = document.getElementById('knowledge-list');
      const countEl = document.getElementById('kb-count');
      countEl.textContent = data.length + ' entries';

      if (data.length === 0) {
        container.innerHTML = '<div class="empty">No matching entries</div>';
        return;
      }

      container.innerHTML = data.map(function(e) {
        const time = e.timestamp ? e.timestamp.replace('T', ' ').split('.')[0] : '';
        const topic = e.topic || e._category || 'unknown';

        // Show only insights
        let body = '';
        if (Array.isArray(e.insights) && e.insights.length > 0) {
          body = JSON.stringify(e.insights, null, 2);
        } else {
          return ''; // Skip entries without insights
        }

        return '<div class="k-entry">' +
          '<span class="k-category">' + esc(e._category || '') + '</span>' +
          '<div class="k-topic">' + esc(topic) + '</div>' +
          '<div class="k-time">' + esc(time) + '</div>' +
          '<div class="k-body">' + esc(body) + '</div>' +
          renderSourceLinks(e.sources) +
          '</div>';
      }).join('');
    }

    document.getElementById('kb-search-btn').addEventListener('click', searchKnowledge);
    document.getElementById('kb-search').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') searchKnowledge();
    });

    // --- Load chat history ---
    async function loadChatHistory() {
      try {
        const res = await fetch(apiUrl + '/chat-history');
        const history = await res.json();
        if (Array.isArray(history) && history.length > 0) {
          chatArea.innerHTML = '';
          for (const msg of history) {
            if (msg.role === 'user' || msg.role === 'assistant') {
              addChatMsg(msg.role, msg.text);
            }
          }
        }
      } catch {}
    }

    // --- Init ---
    async function init() {
      try {
        const res = await fetch('/api-url');
        const data = await res.json();
        apiUrl = data.url;
      } catch {}
      await loadChatHistory();
      fetchStatus();
      fetchLogs();
      fetchSummary();
      fetchKnowledgeDB();
      setInterval(fetchStatus, 5000);
      setInterval(fetchLogs, 5000);
      setInterval(fetchSummary, 10000);
      setInterval(fetchKnowledgeDB, 10000);
    }
    init();
  </script>
